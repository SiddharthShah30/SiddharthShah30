<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Monochrome Signal Waves</title>
  <desc id="desc">Black themed animated wave divider for GitHub profile</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#040404"/>
      <stop offset="100%" stop-color="#121212"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2f2f2f"/>
    </linearGradient>

    <path id="wave-a" d="M0,180 C120,130 220,230 340,180 C470,125 580,235 700,182 C820,130 930,225 1050,178 C1150,140 1220,150 1280,170 L1280,320 L0,320 Z"/>
    <path id="wave-b" d="M0,205 C150,165 250,250 390,210 C520,170 600,255 760,205 C900,160 1010,240 1150,205 C1210,190 1250,188 1280,194 L1280,320 L0,320 Z"/>
    <path id="wave-c" d="M0,230 C150,205 260,280 420,240 C560,205 690,275 850,235 C970,205 1120,255 1280,226 L1280,320 L0,320 Z"/>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>

  <g opacity="0.95" fill="url(#ink)">
    <use href="#wave-a">
      <animateTransform attributeName="transform" type="translate" values="0 0; -90 0; 0 0" dur="10s" repeatCount="indefinite"/>
    </use>
  </g>

  <g opacity="0.75" fill="#242424">
    <use href="#wave-b">
      <animateTransform attributeName="transform" type="translate" values="0 0; 70 0; 0 0" dur="8s" repeatCount="indefinite"/>
    </use>
  </g>

  <g opacity="0.6" fill="#303030">
    <use href="#wave-c">
      <animateTransform attributeName="transform" type="translate" values="0 0; -50 0; 0 0" dur="6s" repeatCount="indefinite"/>
    </use>
  </g>

  <g opacity="0.3" stroke="#f3f3f3" stroke-width="2" fill="none">
    <path d="M0,163 C140,116 230,218 360,165 C505,106 602,218 730,164 C875,107 952,214 1092,163 C1178,131 1238,138 1280,151">
      <animate attributeName="d" dur="9s" repeatCount="indefinite"
        values="M0,163 C140,116 230,218 360,165 C505,106 602,218 730,164 C875,107 952,214 1092,163 C1178,131 1238,138 1280,151;
                M0,170 C120,140 235,200 358,176 C505,138 614,200 734,170 C856,142 964,198 1100,171 C1190,155 1240,158 1280,162;
                M0,163 C140,116 230,218 360,165 C505,106 602,218 730,164 C875,107 952,214 1092,163 C1178,131 1238,138 1280,151"/>
    </path>
  </g>
</svg>
